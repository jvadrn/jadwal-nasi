<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Masak</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
<h3>Set Jadwal Masak</h3>

<input type="date" id="tanggal" class="form-control mb-2">

<select id="nama" class="form-select mb-2"></select>

<select id="waktu" class="form-select mb-2">
  <option>Pagi</option>
  <option>Sore</option>
</select>

<button onclick="setMasak()" class="btn btn-primary">Simpan</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { apiKey:"ISI", authDomain:"ISI", databaseURL:"ISI", projectId:"ISI" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function setMasak(){
  let nama=document.getElementById("nama").value;
  let tanggal=document.getElementById("tanggal").value;
  let waktu=document.getElementById("waktu").value;

  db.ref("jadwalMasak").push({nama,tanggal,waktu});
}

db.ref("anggota").on("value", s=>{
  let sel=document.getElementById("nama");
  sel.innerHTML='';
  s.forEach(c=>{
    sel.innerHTML+=`<option>${c.val().nama}</option>`;
  });
});
</script>
</body>
</html>
