<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Anggota</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container">
    <a class="navbar-brand">Jadwal Nasi</a>
    <div>
      <a class="btn btn-outline-primary me-2" href="index.html">Home</a>
      <a class="btn btn-primary me-2" href="Anggota.html">Anggota</a>
      <a class="btn btn-outline-primary" href="Masak.html">Masak</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

<h3>CRUD Anggota</h3>

<input id="nama" class="form-control mb-2">
<button onclick="simpan()" class="btn btn-primary">Simpan</button>

<div id="list" class="mt-3"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyABa65ltjb7my-uXu8MqJJwl915-hsalzc",
  authDomain: "jadwal-nasi.firebaseapp.com",
  databaseURL: "https://jadwal-nasi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jadwal-nasi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let editKey=null;

function simpan(){
  let nama=document.getElementById("nama").value;
  if(!nama) return;

  if(editKey){
    db.ref("anggota/"+editKey).update({nama});
    editKey=null;
  } else {
    db.ref("anggota").push({nama});
  }

  document.getElementById("nama").value="";
}

function edit(k,n){
  document.getElementById("nama").value=n;
  editKey=k;
}

function hapus(k){
  db.ref("anggota/"+k).remove();
}

db.ref("anggota").on("value", s=>{
  let list=document.getElementById("list");
  list.innerHTML='';

  s.forEach(c=>{
    let d=c.val();

    list.innerHTML+=`
    <div class="d-flex justify-content-between border p-2 mb-1">
      ${d.nama}
      <div>
        <button onclick="edit('${c.key}','${d.nama}')" class="btn btn-warning btn-sm">Edit</button>
        <button onclick="hapus('${c.key}')" class="btn btn-danger btn-sm">X</button>
      </div>
    </div>`;
  });
});
</script>

</body>
</html>
