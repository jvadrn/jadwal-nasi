<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Anggota</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
<h3>Anggota</h3>

<input id="nama" class="form-control mb-2">
<button onclick="tambah()" class="btn btn-primary">Tambah</button>

<div id="list" class="mt-3"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { apiKey:"ISI", authDomain:"ISI", databaseURL:"ISI", projectId:"ISI" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function tambah(){
  let n=document.getElementById("nama").value;
  db.ref("anggota").push({nama:n});
}

function hapus(k){
  db.ref("anggota/"+k).remove();
}

db.ref("anggota").on("value", s=>{
  let list=document.getElementById("list");
  list.innerHTML='';
  s.forEach(c=>{
    list.innerHTML+=`
    <div class="d-flex justify-content-between border p-1 mb-1">
      ${c.val().nama}
      <button onclick="hapus('${c.key}')" class="btn btn-danger btn-sm">X</button>
    </div>`;
  });
});
</script>
</body>
</html>
