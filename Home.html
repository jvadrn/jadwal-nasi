<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container">
    <a class="navbar-brand">Jadwal Nasi</a>
    <div>
      <a class="btn btn-primary me-2" href="Home.html">Home</a>
      <a class="btn btn-outline-primary me-2" href="Anggota.html">Anggota</a>
      <a class="btn btn-outline-primary" href="Masak.html">Masak</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- TANGGAL -->
  <div class="mb-3">
    <input type="date" id="tanggal" class="form-control">
    <h5 id="tanggalText" class="mt-2"></h5>
  </div>

  <!-- MASAK PAGI -->
  <div class="mb-5">
    <h4>Masak Pagi</h4>

    <h6>Yang Masak</h6>
    <ul id="masakPagi" class="list-group mb-2"></ul>

    <select id="namaPagi" class="form-select mb-2"></select>

    <button class="btn btn-primary" onclick="aksi('Ambil','Pagi')">Ambil Nasi</button>

    <h6 class="mt-3">Aktivitas</h6>
    <ul id="aktivitasPagi" class="list-group"></ul>
  </div>

  <!-- MASAK SORE -->
  <div class="mb-5">
    <h4>Masak Sore</h4>

    <h6>Yang Masak</h6>
    <ul id="masakSore" class="list-group mb-2"></ul>

    <select id="namaSore" class="form-select mb-2"></select>

    <button class="btn btn-primary" onclick="aksi('Ambil','Sore')">Ambil Nasi</button>

    <h6 class="mt-3">Aktivitas</h6>
    <ul id="aktivitasSore" class="list-group"></ul>
  </div>

</div>

<script>
let anggota = JSON.parse(localStorage.getItem('anggota')) || [];
let jadwalMasak = JSON.parse(localStorage.getItem('jadwalMasak')) || [];
let aktivitas = JSON.parse(localStorage.getItem('aktivitas')) || [];

function getHari(tanggal) {
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  return hari[new Date(tanggal).getDay()];
}

function loadAnggota() {
  let pagi = document.getElementById('namaPagi');
  let sore = document.getElementById('namaSore');

  pagi.innerHTML = '';
  sore.innerHTML = '';

  anggota.forEach(a => {
    pagi.innerHTML += `<option value="${a}">${a}</option>`;
    sore.innerHTML += `<option value="${a}">${a}</option>`;
  });
}

function aksi(jenis, waktu) {
  let nama = waktu === 'Pagi'
    ? document.getElementById('namaPagi').value
    : document.getElementById('namaSore').value;

  let tanggal = document.getElementById('tanggal').value;
  if (!tanggal || !nama) return;

  aktivitas.unshift({ nama, jenis, waktu, tanggal });
  localStorage.setItem('aktivitas', JSON.stringify(aktivitas));

  render();
}

function hapusAktivitas(index) {
  aktivitas.splice(index, 1);
  localStorage.setItem('aktivitas', JSON.stringify(aktivitas));
  render();
}

function render() {
  let tanggal = document.getElementById('tanggal').value;
  if (!tanggal) return;

  document.getElementById('tanggalText').innerText =
    tanggal + " - " + getHari(tanggal);

  // MASAK
  let pagi = document.getElementById('masakPagi');
  let sore = document.getElementById('masakSore');
  pagi.innerHTML = '';
  sore.innerHTML = '';

  jadwalMasak
    .filter(j => j.tanggal === tanggal)
    .forEach(j => {
      let li = `<li class="list-group-item">${j.nama}</li>`;
      if (j.waktu === 'Pagi') pagi.innerHTML += li;
      else sore.innerHTML += li;
    });

  // AKTIVITAS
  let pagiAct = document.getElementById('aktivitasPagi');
  let soreAct = document.getElementById('aktivitasSore');
  pagiAct.innerHTML = '';
  soreAct.innerHTML = '';

  aktivitas
    .map((a, i) => ({...a, index:i}))
    .filter(a => a.tanggal === tanggal)
    .forEach(a => {
      let li = `
        <li class="list-group-item d-flex justify-content-between">
          ${a.nama}
          <button class="btn btn-danger btn-sm" onclick="hapusAktivitas(${a.index})">Hapus</button>
        </li>
      `;

      if (a.waktu === 'Pagi') pagiAct.innerHTML += li;
      else soreAct.innerHTML += li;
    });
}

// default hari ini
let today = new Date().toISOString().split('T')[0];
document.getElementById('tanggal').value = today;

document.getElementById('tanggal').addEventListener('change', render);

loadAnggota();
render();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
