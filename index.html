<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container">
    <a class="navbar-brand">Jadwal Nasi</a>
    <div>
      <a class="btn btn-primary me-2" href="index.html">Home</a>
      <a class="btn btn-outline-primary me-2" href="Anggota.html">Anggota</a>
      <a class="btn btn-outline-primary" href="Masak.html">Masak</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <input type="date" id="tanggal" class="form-control mb-3">

  <h4>Yang Masak Pagi</h4>
  <div id="masakPagi" class="text-success fs-2" ></div>
  <h4 class="mt-2">Yang sudah ambil nasi pagi</h4>
  <select id="namaPagi" class="form-select mb-2"></select>
  <button class="btn btn-primary" onclick="ambil('Pagi')">Ambil Nasi</button>
  <div id="aktivitasPagi" class="mt-2"></div>

  <hr>
  <h4>Yang Masak Sore</h4>
  <div id="masakSore" class="text-success fs-2 mb-3"></div>
  <h4 class="mt-2">Yang sudah ambil nasi Sore</h4>
  <select id="namaSore" class="form-select "></select>
  <button class="btn btn-primary mt-2" onclick="ambil('Sore')">Ambil Nasi</button>

  <div id="aktivitasSore" class="mt-2"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyABa65ltjb7my-uXu8MqJJwl915-hsalzc",
  authDomain: "jadwal-nasi.firebaseapp.com",
  databaseURL: "https://jadwal-nasi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jadwal-nasi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let anggota = [];
let aktivitas = [];
let masak = [];

/* ===== ANGGOTA ===== */
db.ref("anggota").on("value", snap => {
  const data = snap.val();
  anggota = data ? Object.values(data).map(x => x.nama) : [];
  renderSelect();
});

/* ===== MASAK ===== */
db.ref("jadwalMasak").on("value", snap => {
  const data = snap.val();
  masak = data ? Object.values(data) : [];
  render();
});

/* ===== AKTIVITAS ===== */
db.ref("aktivitas").on("value", snap => {
  const data = snap.val();
  aktivitas = data ? Object.entries(data).map(([k,v]) => ({...v, key:k})) : [];
  render();
});

/* ===== SELECT ===== */
function renderSelect(){
  const pagi = document.getElementById("namaPagi");
  const sore = document.getElementById("namaSore");

  pagi.innerHTML = '<option value="">-- pilih --</option>';
  sore.innerHTML = '<option value="">-- pilih --</option>';

  anggota.forEach(nama => {
    pagi.innerHTML += `<option value="${nama}">${nama}</option>`;
    sore.innerHTML += `<option value="${nama}">${nama}</option>`;
  });
}

/* ===== AMBIL NASI ===== */
function ambil(waktu){
  const nama = document.getElementById(waktu === "Pagi" ? "namaPagi" : "namaSore").value;
  const tanggal = document.getElementById("tanggal").value;

  if(!nama || !tanggal) return;

  db.ref("aktivitas").push({
    nama,
    waktu,
    tanggal
  });
}

/* ===== HAPUS ===== */
function hapus(key){
  db.ref("aktivitas/" + key).remove();
}

/* ===== RENDER ===== */
function render(){
  const t = document.getElementById("tanggal").value;
  if(!t) return;

  const mp = document.getElementById("masakPagi");
  const ms = document.getElementById("masakSore");
  const ap = document.getElementById("aktivitasPagi");
  const as = document.getElementById("aktivitasSore");

  mp.innerHTML = "";
  ms.innerHTML = "";
  ap.innerHTML = "";
  as.innerHTML = "";

  masak.filter(m => m.tanggal === t).forEach(m => {
    const el = `<div>${m.nama}</div>`;
    m.waktu === "Pagi" ? mp.innerHTML += el : ms.innerHTML += el;
  });

  aktivitas.filter(a => a.tanggal === t).forEach(a => {
    const el = `
      <div class="d-flex justify-content-between">
        ${a.nama}
        <button class="btn btn-danger btn-sm" onclick="hapus('${a.key}')">X</button>
      </div>
    `;
    a.waktu === "Pagi" ? ap.innerHTML += el : as.innerHTML += el;
  });
}

/* ===== INIT ===== */
document.getElementById("tanggal").value = new Date().toISOString().split("T")[0];
document.getElementById("tanggal").addEventListener("change", render);
</script>

</body>
</html>
