<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container">
    <a class="navbar-brand">Jadwal Nasi</a>
    <div>
      <a class="btn btn-primary me-2" href="index.html">Home</a>
      <a class="btn btn-outline-primary me-2" href="Anggota.html">Anggota</a>
      <a class="btn btn-outline-primary" href="Masak.html">Masak</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <input type="date" id="tanggal" class="form-control mb-2">
  <h5 id="tanggalText"></h5>

  <h4 class="mt-4">Masak Pagi</h4>
  <div id="masakPagi"></div>
  <select id="namaPagi" class="form-select mb-2"></select>
  <button class="btn btn-primary" onclick="aksi('Pagi')">Ambil Nasi</button>
  <div id="aktivitasPagi" class="mt-2"></div>

  <h4 class="mt-5">Masak Sore</h4>
  <div id="masakSore"></div>
  <select id="namaSore" class="form-select mb-2"></select>
  <button class="btn btn-primary" onclick="aksi('Sore')">Ambil Nasi</button>
  <div id="aktivitasSore" class="mt-2"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  databaseURL: "ISI",
  projectId: "ISI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let anggota=[], aktivitas=[], masak=[];

function getHari(t){
  return ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"][new Date(t).getDay()];
}

db.ref("anggota").on("value", s=>{
  anggota=[];
  s.forEach(c=>anggota.push(c.val().nama));
  loadSelect();
});

db.ref("aktivitas").on("value", s=>{
  aktivitas=[];
  s.forEach(c=>aktivitas.push({...c.val(), key:c.key}));
  render();
});

db.ref("jadwalMasak").on("value", s=>{
  masak=[];
  s.forEach(c=>masak.push(c.val()));
  render();
});

function loadSelect(){
  let p=document.getElementById("namaPagi");
  let s=document.getElementById("namaSore");
  p.innerHTML=''; s.innerHTML='';
  anggota.forEach(a=>{
    p.innerHTML+=`<option>${a}</option>`;
    s.innerHTML+=`<option>${a}</option>`;
  });
}

function aksi(waktu){
  let nama = waktu=='Pagi'
    ? document.getElementById("namaPagi").value
    : document.getElementById("namaSore").value;

  let t=document.getElementById("tanggal").value;

  db.ref("aktivitas").push({nama,waktu,tanggal:t});
}

function hapus(key){
  db.ref("aktivitas/"+key).remove();
}

function render(){
  let t=document.getElementById("tanggal").value;
  if(!t) return;

  document.getElementById("tanggalText").innerText=t+" - "+getHari(t);

  let mp=document.getElementById("masakPagi");
  let ms=document.getElementById("masakSore");
  let ap=document.getElementById("aktivitasPagi");
  let as=document.getElementById("aktivitasSore");

  mp.innerHTML=''; ms.innerHTML=''; ap.innerHTML=''; as.innerHTML='';

  masak.filter(m=>m.tanggal==t).forEach(m=>{
    let el=`<div class="border p-1 mb-1">${m.nama}</div>`;
    m.waktu=='Pagi'?mp.innerHTML+=el:ms.innerHTML+=el;
  });

  aktivitas.filter(a=>a.tanggal==t).forEach(a=>{
    let el=`
    <div class="d-flex justify-content-between border p-1 mb-1">
      ${a.nama}
      <button onclick="hapus('${a.key}')" class="btn btn-danger btn-sm">X</button>
    </div>`;
    a.waktu=='Pagi'?ap.innerHTML+=el:as.innerHTML+=el;
  });
}

let today=new Date().toISOString().split('T')[0];
document.getElementById("tanggal").value=today;
document.getElementById("tanggal").addEventListener("change",render);
</script>
</body>
</html>
